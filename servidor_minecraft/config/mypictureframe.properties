#Configuracion de My Picture Frame
#enable_patreon_message: Mostrar mensaje de Patreon en el chat al ingresar (true/false)
#enable_whitelist: Activar lista blanca de dominios para imagenes (true/false)
#allowed_domains: Dominios permitidos separados por comas (ej. imgur.com,discordapp.com)
#require_op_only: Solo operadores pueden crear/editar marcos (true/false)
#max_render_distance: Distancia de renderizado maxima de marcos (en bloques)
#max_frames_per_player: Limite maximo de marcos que un jugador normal puede colocar
#Tue Jun 30 20:08:39 UTC 2026
allowed_domains=
enable_patreon_message=true
enable_whitelist=false
max_frames_per_player=3
max_render_distance=64
require_op_only=false
